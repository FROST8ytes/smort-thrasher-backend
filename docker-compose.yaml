services:
  web:
    build: .
    command: uvicorn app:app --host 0.0.0.0
    volumes:
      - .:/app
    ports:
      - 8008:8000
  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: smort_thrasher

volumes:
  postgres_data:
